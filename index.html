<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shion个人页</title>
    <link rel="stylesheet" href="css/style.css" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = t;
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <!-- 导航与飞出色块由 js/script.js 统一注入 -->

    <!-- 首页 -->
    <div class="main-wrap">
        <div class="profile-side"></div>
        <div class="content-side">
            <div class="home-center">
                <h1 class="home-name">Shion</h1>
                <p class="home-sub"><span class="gradient-text">輝き</span>の向こう側へ！</p>

            </div>
        </div>
    </div>

    <footer class="footer" id="contact">
    </footer>

    <script src="js/script.js"></script>
    <script>
        // 动态写入 keyframes 并注入样式，避免写死颜色。
        (function () {
            var el = document.querySelector('.gradient-text');
            if (!el || typeof NAV_COLORS === 'undefined' || !NAV_COLORS.length) return;

            var homeColor = NAV_COLORS[0];
            el.style.color = homeColor;

            // 动画首尾都用首页主题色，悬停/离开时从首页色平滑过渡到其它主题色，无跳变
            var seq = NAV_COLORS.slice().concat([homeColor]);

            var n = seq.length - 1;             // 颜色段数
            var step = 100 / n;                 // 每段占的时间百分比
            var css = '@keyframes themeColorShift {\n';
            seq.forEach(function (c, i) {
                var pct = (i * step).toFixed(2);
                css += '  ' + pct + '% { color: ' + c + '; -webkit-text-fill-color: ' + c + '; }\n';
            });
            css += '}\n';

            var style = document.createElement('style');
            style.textContent = css;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
