<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关于 · Shion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .about-page {
            flex: 1;
            display: flex;
            height: 100vh;
        }

        .about-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.15s forwards;
        }

        .about-right {
            flex: 1;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease 0.4s forwards;
        }

        .about-center {
            text-align: left;
            max-width: 500px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .about-center h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }

        .about-center p {
            color: #555;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 0.5rem;
        }

        .about-card {
            display: inline-block;
            margin-top: 1.5rem;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .about-card img {
            width: 500px;
            height: auto;
            display: block;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .about-card.enlarged img {
            transform: scale(1.4);
        }
    </style>
</head>
<body>
    <!-- 右上角汉堡菜单 -->
    <nav class="top-nav" id="topNav">

            <span></span>

            <button class="nav-btn" style="--btn-color: #9b59b6" onclick="window.location.href='card.html'"><span>名片</span></button>
