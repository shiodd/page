<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关于 · Shion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = t;
            } catch (e) {}
        })();
    </script>
    <style>
        .about-page {
            flex: 1;
            display: flex;
            height: 100vh;
        }

        /* 关于页主题色：采用「舆水幸子」链接的紫色，作为本页强调色；
           无论浅色/夜间模式都固定为同一紫色，不随主题变化 */
        :root {
            --accent: #c59fda;
        }
        [data-theme="dark"] {
            --accent: #c59fda;
        }

        #sachikoLink {
            position: relative;
            color: var(--accent);
            text-decoration: none;
        }
        #sachikoLink::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 100%;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.25s ease;
        }
        #sachikoLink:hover::after {
            transform: scaleX(1);
        }

        .about-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.15s forwards;
        }

        .about-right {
            flex: 1;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease 0.4s forwards;
        }

        .about-center {
            text-align: left;
            max-width: 500px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .about-center h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }

        .about-center p {
            color: #555;
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 0.5rem;
        }

        .about-card {
            display: block;
            width: 100%;
            max-width: min(500px, 42vw);
            margin-top: 1.5rem;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .about-card img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .about-card.enlarged img {
            transform: scale(1.4);
        }

        /* 夜间模式：跟随主题，不再白色刺眼 */
        [data-theme="dark"] .about-right {
            background: rgba(30, 32, 48, 0.5);
        }
        [data-theme="dark"] .about-center h2 {
            color: #f0f0f7;
        }
        [data-theme="dark"] .about-center p {
            color: #c2c7d6;
        }
        [data-theme="dark"] .about-center a[style*="color:#555"] {
            color: #c2c7d6 !important;
        }

        #sachikoPreview {
            position: fixed;
            width: 130px;
            max-width: 40vw;
            height: auto;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            /* 不受夜间 img 滤镜影响，保持原图亮度 */
            filter: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }
        #sachikoPreview.show {
            opacity: 1;
            pointer-events: auto; /* 显示时响应点击，可蹦跶 */
        }
        /* 切换主题时临时淡出旧图：淡出快、淡入慢 */
        #sachikoPreview.switching {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        #sachikoPreview.bounce {
            animation: sachikoBounce 0.6s ease;
        }
        @keyframes sachikoBounce {
            0%   { transform: translateY(6px) scale(0.85); }
            40%  { transform: translateY(-16px) scale(1.06); }
            60%  { transform: translateY(0) scale(1); }
            75%  { transform: translateY(-7px) scale(1.03); }
            100% { transform: translateY(0) scale(1); }
        }
        /* 鼠标按下蓄力：下蹲压缩，松开即蹦 */
        #sachikoPreview.ready {
            transform: translateY(8px) scale(0.84);
            transition: transform 0.12s ease;
        }
        [data-theme="dark"] #sachikoPreview {
            width: 130px;
        }
    </style>
</head>
<body>
    <!-- 导航与飞出色块由 ../js/script.js 统一注入 -->

    <div class="about-page">
        <div class="about-left">
            <div class="about-card" id="aboutCard">
                <img src="../image/meishi/me/正.png" alt="名片正面" />
            </div>
        </div>
        <div class="about-right">
            <div class="about-center">
                <h2>关于</h2>
                <p>欢迎，这是Shion的个人主页。</p>
                <p>平时喜欢搞点二次元，什么都搞一点，但主要是偶像大师。</p>
                <p><a href="https://mobile.moegirl.org.cn/%E8%88%86%E6%B0%B4%E5%B9%B8%E5%AD%90" target="_blank" rel="noopener" id="sachikoLink">舆水幸子</a>P，<span style="text-decoration:line-through;color:#999;">也看点其他人。</span></p>
                <div style="margin-top:1.5rem;">
                    <a href="https://github.com/shiodd" target="_blank" rel="noopener" style="display:inline-flex;color:#555;">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                    </a>
                </div>
            </div>
        </div>
        <script>
                document.getElementById('aboutCard').addEventListener('click', function() {
                    this.classList.toggle('enlarged');
                });
        </script>
    </div>

    <!-- 悬停时显示的 SD 小人预览 -->
    <img id="sachikoPreview" alt="舆水幸子 SD" />

    <script src="../js/script.js"></script>
    <script>
        
        (function () {
            const link = document.getElementById('sachikoLink');
            const preview = document.getElementById('sachikoPreview');
            if (!link || ! preview) return;
            function sachikoSrc() {
                const isDark = document.documentElement.dataset.theme === 'dark';
                return isDark
                    ? '../image/about/sd/sd_night.png'
                    : '../image/about/sd/sd_sun.png';
            }
            
            function sachikoFilter() {
                const isDark = document.documentElement.dataset.theme === 'dark';
                return isDark ? 'brightness(0.68) saturate(0.9)' : 'none';
            }
            const SWITCH_IN_MS = 1500; // 切换模式时 SD 小人的淡入时长
            preview.addEventListener('load', () => {
                positionPreview();
                if (preview.classList.contains('switching')) {
                    preview.style.transition = 'opacity ' + (SWITCH_IN_MS / 1000) + 's ease';
                    void preview.offsetWidth; // 强制 reflow，确保后续 opacity 变化走过渡而非瞬切
                    preview.classList.remove('switching');
                    // 淡入结束后恢复 base 过渡，避免影响点击显示/隐藏
                    setTimeout(() => { preview.style.transition = ''; }, SWITCH_IN_MS);
                }
            });
            function bouncePreview() {
                preview.classList.remove('bounce');
                void preview.offsetWidth;
                preview.classList.add('bounce');
            }
            // 提前为日/夜两种语音各建一个 Audio 并预加载，避免每次点击都重新拉取导致延迟
            const sdAudioDay = new Audio('../sound/voice/about/sd_sun.mp3');
            const sdAudioNight = new Audio('../sound/voice/about/sd_night.mp3');
            [sdAudioDay, sdAudioNight].forEach(a => { a.preload = 'auto'; a.load(); });
            function playSdSfx() {
                const isDark = document.documentElement.dataset.theme === 'dark';
                const a = isDark ? sdAudioNight : sdAudioDay;
                a.currentTime = 0;
                a.play().catch(() => {});
            }
            function positionPreview() {
                const r = link.getBoundingClientRect();
                const pw = preview.offsetWidth || 150;
                const ph = preview.offsetHeight || 0;
                let left = r.left - pw - 12;
                let top = r.top + r.height / 2 - ph / 2;
                if (left < 8) left = r.right + 12; // 左侧空间不足则显示在右侧
                if (top < 8) top = 8;
                preview.style.left = left + 'px';
                preview.style.top = top + 'px';
            }
            link.addEventListener('click', (e) => {
                e.preventDefault(); // 阻止跳转链接
                if (preview.classList.contains('show')) {
                    preview.classList.remove('show', 'switching'); // 再次点击消失
                } else {
                    preview.classList.remove('switching');
                    preview.style.filter = sachikoFilter();
                    preview.src = sachikoSrc();
                    preview.classList.add('show');
                    positionPreview();
                    bouncePreview(); // 出场蹦跶
                }
            });
            let pressing = false;
            preview.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                if (!preview.classList.contains('show')) return;
                pressing = true;
                preview.classList.add('ready'); // 蓄力下蹲
            });
            function releaseBounce() {
                if (!pressing) return;
                pressing = false;
                preview.classList.remove('ready'); // 解除蓄力
                playSdSfx(); // 播放对应主题音效
                bouncePreview(); // 蹦跶
            }
            preview.addEventListener('mouseup', (e) => {
                e.stopPropagation();
                releaseBounce();
            });
            // 在元素外松开也能蹦跶
            document.addEventListener('mouseup', releaseBounce);
            const themeObserver = new MutationObserver(() => {
                if (preview.classList.contains('show')) {
                    preview.style.transition = ''; // 清残留 inline 过渡，确保淡出用 .switching 的 0.2s
                    preview.classList.remove('bounce'); // 避免蹦跶与切换淡出冲突
                    preview.classList.remove('ready'); // 清蓄力，避免卡住
                    preview.classList.add('switching'); // 淡出旧图
                    setTimeout(() => {
                        preview.style.filter = sachikoFilter();
                        preview.src = sachikoSrc();
                    }, 250);
                }
            });
            themeObserver.observe(document.documentElement, {
                attributes: true,
                attributeFilter: ['data-theme'],
            });
        })();
    </script>
</body>
</html>
