<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>友链 · Shion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = t;
            } catch (e) {}
        })();
    </script>
    <style>
        /* 与 记录/关于 页面一致：上对齐、居中包裹容器、统一标题与暗色风格 */
        .friends-page {
            flex: 1;
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
        }

        .friends-wrap {
            max-width: 900px;
            width: 100%;
        }

        .friends-wrap h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .friend-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .friend-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .friend-card img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 0.75rem;
        }

        .friend-card .name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .card-flip {
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-flip-inner {
            position: relative;
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
        }

        .card-flip.flipped-right .card-flip-inner {
            transform: rotateY(180deg);
        }

        .card-flip.flipped-left .card-flip-inner {
            transform: rotateY(-180deg);
        }

        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-face img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform: rotateY(180deg);
        }

        @media (max-width: 480px) {
            .friends-page {
                padding: 2rem 1.25rem;
            }
            .friend-card {
                padding: 1rem;
            }
        }

        /* 夜间模式：跟随主题，不再白色刺眼（与 record-item 一致） */
        [data-theme="dark"] .friend-card {
            background: rgba(40, 42, 60, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        }
        [data-theme="dark"] .friends-wrap h2,
        [data-theme="dark"] .friend-card .name {
            color: #f0f0f7;
        }
    </style>
</head>
<body>
    <!-- 导航与飞出色块由 ../js/script.js 统一注入 -->

    <div class="friends-page">
        <div class="friends-wrap">
            <h2>友链</h2>
            <div class="friends-grid" id="friendsGrid"></div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <!-- 友链数据在 HTML 外维护：data/friends.js（定义全局 friendsData） -->
    <script src="data/friends.js"></script>

    <script>
        // 数据来自 data/friends.js，这里只负责渲染
        const grid = document.getElementById('friendsGrid');

        friendsData.forEach((friend, index) => {
            const card = document.createElement('div');
            card.className = 'friend-card';
            card.style.animationDelay = (index * 0.08) + 's'; // 逐张错落浮现
            card.innerHTML = `
                <div class="card-flip" data-index="${index}">
                    <div class="card-flip-inner">
                        <div class="card-face card-front">
                            <img src="${friend.front}" alt="${friend.name}名片正面" />
                        </div>
                        <div class="card-face card-back">
                            <img src="${friend.back}" alt="${friend.name}名片反面" />
                        </div>
                    </div>
                </div>
                <div class="name">${friend.name}</div>
            `;
            grid.appendChild(card);
        });
        // 翻转逻辑由 ../js/script.js 的 bindCardFlip() 统一处理
    </script>
</body>
</html>
