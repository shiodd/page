<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>友链 · Shion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = t;
            } catch (e) {}
        })();
    </script>
    <style>
        :root {
            --accent-base: #F3983B;
            --accent: var(--accent-base);
        }
        [data-theme="dark"] {
            --accent: color-mix(in srgb, var(--accent-base) 70%, #000);
        }

        .friends-page {
            flex: 1;
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
        }

        .friends-wrap {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 2rem;
            align-items: start;
        }

        .friends-main {
            min-width: 0;
        }

        .friends-head {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .friends-head h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin: 0;
        }
        .friends-head .apply-link {
            position: relative;
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }
        /* 下划线动画：默认从左侧收起，hover 时向左生长出现 */
        .friends-head .apply-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 100%;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.25s ease;
        }
        .friends-head .apply-link:hover::after,
        .friends-head .apply-link.active::after {
            transform: scaleX(1);
        }

        /* 右侧「如何申请友链」教程面板 */
        .friends-aside {
            width: 310px;
            background: rgba(255, 255, 255, 0.9);
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        .friends-aside.show {
            opacity: 1;
            visibility: visible;
        }
        .friends-aside h3 {
            margin: 0 0 1rem;
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a1a2e;
        }
        .friends-aside ol {
            margin: 0 0 1rem;
            padding-left: 1.25rem;
            line-height: 1.7;
            color: #1a1a2e;
        }
        .friends-aside code {
            background: rgba(0, 0, 0, 0.08);
            padding: 0.1em 0.4em;
            font-size: 0.9em;
        }
        .friends-aside p {
            margin: 0;
            line-height: 1.6;
            color: #1a1a2e;
        }
        /* 通用主题色下划线链接：与标题「如何申请友链」完全一致——
           ::after 固定 width:100% + scaleX(0→1) 从左生长，无内边距、不显窄；名片与教程复用同一套 */
        .u-link {
            position: relative;
            color: inherit;
            text-decoration: none;
        }
        .u-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 100%;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.25s ease;
        }
        .u-link:hover::after {
            transform: scaleX(1);
        }
        /* 教程内的链接文字用主题色（名片名字链接保持深色，由各自上下文决定） */
        .friends-aside .u-link {
            color: var(--accent);
        }
        /* 点击后从标题链接伸出的主题色引导细线，延伸到右侧教程 */
        .apply-line {
            position: fixed;
            height: 2px;
            background: var(--accent);
            transform-origin: left center;
            transform: scaleX(0);
            transition: transform 0.45s ease;
            z-index: 1001;
            pointer-events: none;
        }
        .apply-line.show {
            transform: scaleX(1);
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100%;
        }

        .friend-card {
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .friend-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        @keyframes fadeInUp {
            0%   { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .friend-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 91 / 55;      /* 锁定标准名片比例 91mm × 55mm */
            object-fit: cover;          /* 源图非此比例时裁切填充，保证墙面整齐不拉伸 */
            display: block;
        }

        /* 名称放在图片下方，与卡片背景一致；inline-block 使文字居中 */
        .friend-card .name {
            display: inline-block;
            padding: 0.65rem 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        /* 名片名字链接复用通用 .u-link（JS 中给带链接的名字加 class="u-link"）；
           纯文本名字没有 <a>，自然无下划线 */


        /* 点击放大遮罩（与 记录页 一致：无圆角、scale 缩放、底部控制条） */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease;
            z-index: 1002;
            cursor: zoom-out;
        }

        .lightbox.open {
            opacity: 1;
            visibility: visible;
        }

        .lightbox img {
            max-width: 55vw;
            max-height: 55vh;
            width: auto;
            height: auto;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            cursor: zoom-out;
            transition: transform 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        /* 放大层底部缩放控制条 */
        .lightbox-bar {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(20, 22, 34, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0;
            z-index: 2;
        }
        .lightbox-bar button {
            width: 2rem;
            height: 2rem;
            border: none;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .lightbox-bar button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .lightbox-bar #zoomReset,
        .lightbox-bar #flipSide {
            width: auto;
            border-radius: 0;
            padding: 0 0.9rem;
            font-size: 0.85rem;
        }
        .lightbox-bar #zoomVal {
            min-width: 3rem;
            text-align: center;
            color: #fff;
            font-size: 0.85rem;
            user-select: none;
        }

        @media (max-width: 760px) {
            .friends-wrap {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .friends-page {
                padding: 2rem 1.25rem;
            }
            .friends-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 夜间模式：跟随主题，不再白色刺眼（与 record-item 一致） */
        [data-theme="dark"] .friend-card {
            background: rgba(40, 42, 60, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        }
        [data-theme="dark"] .friends-head h2,
        [data-theme="dark"] .friend-card .name {
            color: #f0f0f7;
        }
        [data-theme="dark"] .friends-aside {
            background: rgba(40, 42, 60, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        }
        [data-theme="dark"] .friends-aside h3,
        [data-theme="dark"] .friends-aside ol,
        [data-theme="dark"] .friends-aside p {
            color: #f0f0f7;
        }
        [data-theme="dark"] .friends-aside code {
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>
    <!-- 导航与飞出色块由 ../js/script.js 统一注入 -->

    <div class="friends-page">
        <div class="friends-wrap">
            <div class="friends-main">
                <div class="friends-head">
                    <h2>友链</h2>
                    <span class="apply-link" id="applyLink">如何申请友链</span>
                </div>
                <div class="friends-grid" id="friendsGrid"></div>
            </div>

            <!-- 点击后伸出的引导细线 -->
            <div class="apply-line" id="applyLine"></div>

            <aside class="friends-aside" id="applyAside">
                <h3>如何申请友链</h3>
                
                <p>要求：一张<strong>自己制作的</strong>名片正反面，可以不是偶像大师ip，尺寸最好为 91mm*55mm 或 90mm*54mm。</p>
                <ol>
                    <li><a class="u-link" href="https://github.com/shiodd/page/issues" target="_blank" rel="noopener noreferrer">提交 Issue</a>，选择「申请友链」模板。</li>
                    <li>填写：名字、名片正面图片链接、名片反面图片链接（图片需公网可直接访问，支持 png / jpg）。</li>
                    <li>可选填写「个人主页链接」，名字会变为可点击的链接。</li>
                    <li>审核通过后会自动下载你的名片并写入友链墙。可能需要ctrl+f5刷新页面缓存才能看到。</li>
                </ol>
            </aside>
        </div>
    </div>

    <!-- 点击放大查看名片 -->
    <div class="lightbox" id="lightbox">
        <img alt="放大图" />
        <div class="lightbox-bar">
            <button type="button" id="zoomOut" title="缩小">−</button>
            <span id="zoomVal">100%</span>
            <button type="button" id="zoomIn" title="放大">＋</button>
            <button type="button" id="zoomReset" title="还原">还原</button>
            <button type="button" id="flipSide" title="正反面">反面</button>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <!-- 友链数据在 HTML 外维护：data/friends.js（定义全局 friendsData） -->
    <script src="data/friends.js"></script>

    <script>

        try {
            const _themeColor = (typeof getCurrentPage === 'function' && getCurrentPage().color) || '#F3983B';
            document.documentElement.style.setProperty('--accent-base', _themeColor);
        } catch (e) {}

        // 数据来自 data/friends.js，这里只负责渲染
        const grid = document.getElementById('friendsGrid');

        friendsData.forEach((friend, index) => {
            const card = document.createElement('div');
            card.className = 'friend-card';
            card.style.animationDelay = (index * 0.08) + 's'; // 逐张错落浮现

            // 名称可选超链接：仅 http/https 才视为合法链接
            const url = (friend.url && /^https?:\/\//i.test(friend.url)) ? friend.url : '';
            const nameHtml = url
                ? `<a class="u-link" href="${url}" target="_blank" rel="noopener noreferrer">${friend.name}</a>`
                : friend.name;

            card.innerHTML = `
                <img src="${friend.front}" alt="${friend.name}名片正面" />
                <div class="name">${nameHtml}</div>
            `;
            // 点名称链接只跳转，不触发放大
            card.addEventListener('click', (e) => {
                if (e.target.closest('a')) return;
                openLightbox(friend);
            });
            grid.appendChild(card);
        });

        // ========== 点击放大（与 记录页 一致：scale 缩放、点遮罩/Esc 关闭） ==========
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');
        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');
        const zoomResetBtn = document.getElementById('zoomReset');
        const zoomVal = document.getElementById('zoomVal');
        const flipBtn = document.getElementById('flipSide');
        let zoom = 1;
        const ZOOM_MIN = 0.4, ZOOM_MAX = 3, ZOOM_STEP = 0.2;
        let currentFriend = null;
        let showingBack = false;

        function applyZoom() {
            lightboxImg.style.transform = 'scale(' + zoom + ')';
            zoomVal.textContent = Math.round(zoom * 100) + '%';
        }
        function resetZoom() {
            zoom = 1;
            applyZoom();
        }
        function openLightbox(friend) {
            currentFriend = friend;
            showingBack = false;
            lightboxImg.src = friend.front;
            flipBtn.textContent = '反面';
            lightbox.classList.add('open');
        }

        // 点遮罩背景或大图本身都关闭
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('open');
            resetZoom();
        });
        zoomInBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            zoom = Math.min(zoom + ZOOM_STEP, ZOOM_MAX);
            applyZoom();
        });
        zoomOutBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            zoom = Math.max(zoom - ZOOM_STEP, ZOOM_MIN);
            applyZoom();
        });
        zoomResetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetZoom();
        });
        // 正反面切换
        flipBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showingBack = !showingBack;
            lightboxImg.src = showingBack ? currentFriend.back : currentFriend.front;
            flipBtn.textContent = showingBack ? '正面' : '反面';
        });
        // ========== 如何申请友链：默认隐藏，点击后细线引导并显示右侧教程 ==========
        const applyLink = document.getElementById('applyLink');
        const applyAside = document.getElementById('applyAside');
        const applyLine = document.getElementById('applyLine');
        const friendsPage = document.querySelector('.friends-page');
        let applyOpen = false;

        // 依据当前链接/面板位置实时计算细线几何，使其始终连接两者
        function positionApplyLine() {
            const lr = applyLink.getBoundingClientRect();
            const ar = applyAside.getBoundingClientRect();
            const startX = lr.right;
            const startY = lr.bottom + 1; // 从下划线所在位置延伸（下划线在文字底部下方约 1px）
            const endX = ar.left;
            const len = Math.max(60, endX - startX);
            applyLine.style.left = startX + 'px';
            applyLine.style.top = startY + 'px';
            applyLine.style.width = len + 'px';
        }

        // 视口变化（缩放/滚动）时重新锚定细线，避免错位
        function reflowApplyLine() {
            if (!applyOpen) return;
            if (window.innerWidth <= 760) {
                applyLine.classList.remove('show');
                return;
            }
            applyLine.classList.add('show');
            positionApplyLine();
        }

        // 面板位于文档流中，随页面滚动（可滚出视图），无需固定定位；
        // 引导细线通过 getBoundingClientRect 实时连接文字与面板，滚动时由 reflowApplyLine 重锚。

        function onViewportChange() {
            reflowApplyLine();
        }

        function openApply() {
            applyOpen = true;
            applyLink.classList.add('active');
            // 窄屏两栏已堆叠，直接显示，不画横向细线
            if (window.innerWidth <= 760) {
                applyAside.classList.add('show');
                applyLine.classList.remove('show');
                return;
            }
            applyLine.classList.remove('show');
            void applyLine.offsetWidth; // 强制重排，确保细线从 0 重新生长
            positionApplyLine();
            applyLine.classList.add('show');
            // 细线到位后显示教程；下划线与细线在展开期间保持显示，关闭时才收回
            setTimeout(() => applyAside.classList.add('show'), 470);
        }
        function closeApply() {
            applyOpen = false;
            applyAside.classList.remove('show');
            applyLine.classList.remove('show');
            applyLink.classList.remove('active');
        }

        // 缩放时重锚细线；滚动时（面板随页面滚动）细线实时重锚，始终连接文字与面板
        window.addEventListener('resize', onViewportChange);
        if (friendsPage) friendsPage.addEventListener('scroll', reflowApplyLine);

        applyLink.addEventListener('click', () => {
            if (applyAside.classList.contains('show')) {
                closeApply();
            } else {
                openApply();
            }
        });

        // Esc 关闭放大层 / 教程
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                lightbox.classList.remove('open');
                resetZoom();
                closeApply();
            }
        });
    </script>
</body>
</html>
