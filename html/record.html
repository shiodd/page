<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记录 · Shion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .record-page {
            flex: 1;
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
        }

        .record-wrap {
            max-width: 720px;
            width: 100%;
        }

        .record-wrap h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }

        /* 文章卡片 */
        .record-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 1.75rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .record-item .record-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .record-item .title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.4;
        }

        .record-item .date {
            font-size: 0.85rem;
            color: #999;
            font-weight: 500;
            flex-shrink: 0;
        }

        .record-item .text {
            color: #555;
            font-size: 1rem;
            line-height: 1.9;
        }

        .record-item .text p {
            margin-bottom: 0.9rem;
        }

        .record-item .text p:last-child {
            margin-bottom: 0;
        }

        @media (max-width: 480px) {
            .record-page {
                padding: 2rem 1.25rem;
            }
            .record-item {
                padding: 1.5rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航与飞出色块由 ../js/script.js 统一注入 -->

    <div class="record-page">
        <div class="record-wrap">
            <h2>记录</h2>
            <div id="recordList"></div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <!-- 随笔数据在 HTML 外维护：data/records.js（定义全局 recordData） -->
    <script src="data/records.js"></script>
    <script>
        // 数据来自 ../js/records.js，这里只负责渲染
        const list = document.getElementById('recordList');
        recordData.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'record-item';
            el.style.animationDelay = (0.15 + i * 0.12) + 's';

            const head = document.createElement('div');
            head.className = 'record-head';

            const title = document.createElement('span');
            title.className = 'title';
            title.textContent = item.title;

            const date = document.createElement('span');
            date.className = 'date';
            date.textContent = item.date;

            head.append(title, date);

            const text = document.createElement('div');
            text.className = 'text';
            (item.content || []).forEach(p => {
                const para = document.createElement('p');
                para.textContent = p;
                text.appendChild(para);
            });

            el.append(head, text);
            list.appendChild(el);
        });
    </script>
</body>
</html>
