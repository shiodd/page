<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>名片 · 张三</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        body {
            min-height: 100vh;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow: auto;
        }

        .card-page {
            max-width: 700px;
            width: 100%;
            padding: 3rem 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease 0.4s forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 返回按钮 */
        .card-page .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border: none;
            background: #9b59b6;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 2.5rem;
            align-self: flex-start;
            transition: background 0.25s;
        }

        .card-page .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .card-page .back-btn:hover {
            background: #7d3c98;
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ddd;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -2rem;
            top: 0.5rem;
            width: 14px;
            height: 14px;
            background: #9b59b6;
            border-radius: 0;
            transform: translateX(-50%);
        }

        .timeline-item .date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* 名片翻转容器 */
        .card-flip {
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-flip-inner {
            position: relative;
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
        }

        .card-flip.flipped-right .card-flip-inner {
            transform: rotateY(180deg);
        }

        .card-flip.flipped-left .card-flip-inner {
            transform: rotateY(-180deg);
        }

        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-face img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform: rotateY(180deg);
        }

        .card-page .footer {
            margin-top: 2.5rem;
            align-self: center;
        }

        @media (max-width: 480px) {
            .card-page .container {
                padding: 2rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航与飞出色块由 ../js/script.js 统一注入 -->

    <div class="card-page">
        <button class="back-btn" onclick="window.location.href='../index.html#home'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span>返回主页</span>
        </button>

        <div class="timeline" id="timeline"></div>

        <footer class="footer">
        </footer>
    </div>

    <script src="../js/script.js"></script>

    <script>
        // ===== 数据 =====
        const cardData = [
            {
                date: '2026.07.21',
                front: '../image/meishi/me/正.png',
                back: '../image/meishi/me/反.png'
            },
            
            {
                date: '2026.07.20',
                front: '../image/meishi/me/正.png',
                back: '../image/meishi/me/反.png'
            }


        ];

        // ===== 渲染 =====
        const timeline = document.getElementById('timeline');

        cardData.forEach((item, index) => {
            const itemEl = document.createElement('div');
            itemEl.className = 'timeline-item';

            itemEl.innerHTML = `
                <div class="date">${item.date}</div>
                <div class="card-flip" data-index="${index}">
                    <div class="card-flip-inner">
                        <div class="card-face card-front">
                            <img src="${item.front}" alt="名片正面" />
                        </div>
                        <div class="card-face card-back">
                            <img src="${item.back}" alt="名片反面" />
                        </div>
                    </div>
                </div>
            `;

            timeline.appendChild(itemEl);
        });
        // 翻转逻辑由 ../js/script.js 的 bindCardFlip() 统一处理
    </script>
</body>
</html>
