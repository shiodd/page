<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>名片 · 张三</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .card-page {
            max-width: 600px;
            width: 100%;
        }

        .card-page .container {
            padding: 3rem 2.5rem;
            flex-direction: column;
            align-items: stretch;
            min-height: auto;
        }

        /* 返回按钮 */
        .card-page .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border: none;
            background: #1a1a2e;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 2.5rem;
            align-self: flex-start;
            transition: background 0.25s;
        }

        .card-page .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .card-page .back-btn:hover {
            background: #333;
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ddd;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -2rem;
            top: 0.5rem;
            width: 14px;
            height: 14px;
            background: #9b59b6;
            border-radius: 0;
            transform: translateX(-50%);
        }

        .timeline-item .date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* 名片翻转容器 */
        .card-flip {
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-flip-inner {
            position: relative;
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
        }

        .card-flip.flipped-right .card-flip-inner {
            transform: rotateY(180deg);
        }

        .card-flip.flipped-left .card-flip-inner {
            transform: rotateY(-180deg);
        }

        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-face img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform: rotateY(180deg);
        }

        .card-page .footer {
            margin-top: 2.5rem;
            align-self: center;
        }

        @media (max-width: 480px) {
            .card-page .container {
                padding: 2rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- 右上角汉堡菜单 -->
    <nav class="top-nav" id="topNav">
        <button class="nav-toggle" id="navToggle" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-dropdown" id="navDropdown">
            <button class="nav-btn" style="--btn-color: #e74c3c" data-target="home">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span>首页</span>
            </button>
            <button class="nav-btn" style="--btn-color: #3498db" data-target="about">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>关于</span>
            </button>
            <button class="nav-btn" style="--btn-color: #2ecc71" data-target="blog">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <span>博客</span>
            </button>
            <button class="nav-btn" style="--btn-color: #f39c12" data-target="projects">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 14v3h-3v2h3v3h2v-3h3v-2h-3v-3h-2zm-9-3c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm0 4c2 0 6 1 6 3v1H4v-1c0-2 4-3 6-3z"/></svg>
                <span>项目</span>
            </button>
            <button class="nav-btn" style="--btn-color: #9b59b6" data-target="contact">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <span>名片</span>
            </button>
        </div>
    </nav>

    <!-- 飞出色块的容器 -->
    <div class="arrow-blocks" id="arrowBlocks"></div>

    <div class="card-page">
        <div class="container">
            <button class="back-btn" onclick="window.location.href='../index.html#home'">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                <span>返回主页</span>
            </button>

            <div class="timeline" id="timeline"></div>

            <footer class="footer">
                <p>&copy; 2026 张三 · Made with ❤</p>
            </footer>
        </div>
    </div>

    <script src="../js/script.js"></script>

    <script>
        // ===== 数据 =====
        const cardData = [
            {
                date: '2026.07.21',
                front: '../image/meishi/正.png',
                back: '../image/meishi/反.png'
            },
            
            {
                date: '2026.07.20',
                front: '../image/meishi/正.png',
                back: '../image/meishi/反.png'
            }


        ];

        // ===== 渲染 =====
        const timeline = document.getElementById('timeline');

        cardData.forEach((item, index) => {
            const itemEl = document.createElement('div');
            itemEl.className = 'timeline-item';

            itemEl.innerHTML = `
                <div class="date">${item.date}</div>
                <div class="card-flip" data-index="${index}">
                    <div class="card-flip-inner">
                        <div class="card-face card-front">
                            <img src="${item.front}" alt="名片正面" />
                        </div>
                        <div class="card-face card-back">
                            <img src="${item.back}" alt="名片反面" />
                        </div>
                    </div>
                </div>
            `;

            timeline.appendChild(itemEl);
        });

        // ===== 翻转逻辑 =====
        document.querySelectorAll('.card-flip').forEach(el => {
            el.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const isLeft = x < rect.width / 2;
                const isFlipped = this.classList.contains('flipped-right') || this.classList.contains('flipped-left');

                this.classList.remove('flipped-right', 'flipped-left');

                if (!isFlipped) {
                    this.classList.add(isLeft ? 'flipped-right' : 'flipped-left');
                }
            });
        });

        // ===== 页面加载时根据 hash 显示色条 =====
        window.addEventListener('load', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const colorMap = {
                    home: '#e74c3c',
                    about: '#3498db',
                    blog: '#2ecc71',
                    projects: '#f39c12',
                    contact: '#9b59b6'
                };
                const color = colorMap[hash];
                if (color) {
                    const container = document.getElementById('arrowBlocks');
                    document.querySelectorAll('.arrow-block').forEach(el => el.remove());
                    const block = document.createElement('div');
                    block.className = 'arrow-block stay';
                    block.style.setProperty('--block-color', color);
                    block.style.background = `linear-gradient(180deg, ${color}, ${color}dd)`;
                    block.style.left = '0';
                    block.innerHTML = '';
                    container.appendChild(block);
                }
            }
        });
    </script>
</body>
</html>
