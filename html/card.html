<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>名片 · Shion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = t;
            } catch (e) {}
        })();
    </script>
    <style>
        body {
            min-height: 100vh;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow: auto;
        }

        .card-page {
            max-width: 700px;
            width: 100%;
            padding: 3rem 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease 0.4s forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ddd;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -2rem;
            top: 0.5rem;
            width: 14px;
            height: 14px;
            background: #ffbad6;
            border-radius: 0;
            transform: translateX(-50%);
        }

        .timeline-item .date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* 名片翻转容器 */
        .card-flip {
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-flip-inner {
            position: relative;
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
        }

        .card-flip.flipped-right .card-flip-inner {
            transform: rotateY(180deg);
        }

        .card-flip.flipped-left .card-flip-inner {
            transform: rotateY(-180deg);
        }

        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-face img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform: rotateY(180deg);
        }

        .card-page .footer {
            margin-top: 2.5rem;
            align-self: center;
        }

        @media (max-width: 480px) {
            .card-page .container {
                padding: 2rem 1.25rem;
            }
        }

        [data-theme="dark"] .timeline::before,
        [data-theme="dark"] .timeline-item::before {
            filter: brightness(0.62) saturate(0.85);
        }
        [data-theme="dark"] .timeline-item .date {
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- 导航与飞出色块由 ../js/script.js 统一注入 -->

    <div class="card-page">
        <div class="timeline" id="timeline"></div>

        <footer class="footer">
        </footer>
    </div>

    <script src="../js/script.js"></script>
    <script src="data/cards.js"></script>

    <script>
        // 数据来自 data/cards.js，这里只负责渲染
        const timeline = document.getElementById('timeline');

        cardData.forEach((item, index) => {
            const itemEl = document.createElement('div');
            itemEl.className = 'timeline-item';

            itemEl.innerHTML = `
                <div class="date">${item.date}</div>
                <div class="card-flip" data-index="${index}">
                    <div class="card-flip-inner">
                        <div class="card-face card-front">
                            <img src="${item.front}" alt="名片正面" />
                        </div>
                        <div class="card-face card-back">
                            <img src="${item.back}" alt="名片反面" />
                        </div>
                    </div>
                </div>
            `;

            timeline.appendChild(itemEl);
        });
    </script>
</body>
</html>
